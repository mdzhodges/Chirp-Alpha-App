server.error.include-message=always
server.error.include-binding-errors=always
grpc.server.host=${GRPC_SERVER_HOST:localhost}
grpc.server.port=${GRPC_SERVER_PORT:50051}

spring.cache.type=none
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

cache.redis.enabled=${REDIS_CACHE_ENABLED:true}
cache.redis.log-ops=${CACHE_REDIS_LOG_OPS:false}
cache.redis.host=${REDIS_HOST:localhost}
cache.redis.port=${REDIS_PORT:6379}
cache.redis.outage-backoff=${CACHE_REDIS_OUTAGE_BACKOFF:PT5M}
cache.redis.ticker-ttl=${CACHE_TICKER_TTL:PT5M}
cache.redis.momentum-ttl=${CACHE_MOMENTUM_TTL:PT1H}
cache.redis.stocktwits-ttl=${CACHE_STOCKTWITS_TTL:PT15M}
